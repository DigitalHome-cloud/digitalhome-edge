# digitalhome.edge — Docker Compose stack (collapsed to one container).
#
# The whole edge now runs in one Node-RED container: flows, MCP wire,
# cloud sync, dashboard, sensor buffer. Both dhc-mcp and dhc-sync palettes
# are baked into the image at build time from ../contrib/.
#
# Ports on this stack are 1881 (Node-RED editor + dashboard + /api/*)
# and Node-RED serves MCP under the same port (/mcp/sse + /mcp/messages/*).
# The 8443 MCP port used by the old separate mcp-server container is gone;
# once cutover from the old systemd stack happens, this stack takes over 1880.
#
# network_mode: host is required for Matter mDNS discovery (Phase 4+); we
# keep it now so the shape doesn't change at Matter add.

services:

  node-red:
    build:
      context: ..                       # repo root — needs access to contrib/
      dockerfile: deploy/nodered/Dockerfile
    image: digitalhome/dhe-nodered:local
    container_name: dhe-nodered
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/dhe/node-red-data:/data
      - /opt/dhe/secrets:/secrets:ro
      - /opt/dhe/config:/config:ro
      - /opt/dhe/cbox:/cbox
      - /opt/dhe/timeseries:/timeseries
    environment:
      - TZ=Europe/Brussels
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${DHE_NODERED_PORT:-1881}/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
