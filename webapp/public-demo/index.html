<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>digitalhome.edge</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --line:rgba(148,163,184,.25); --fg:#e2e8f0; --muted:#94a3b8; --ok:#22c55e; --off:#64748b; --accent:#38bdf8; --err:#ef4444; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--off); }
  header .dot.live { background:var(--ok); box-shadow:0 0 8px var(--ok); }
  header .src { font-size:11px; color:var(--muted); }
  main { max-width:1000px; margin:0 auto; padding:24px; }
  .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .card h2 { font-size:14px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:0 0 12px; display:flex; align-items:center; gap:8px; }
  .badge { font-size:12px; padding:2px 8px; border-radius:999px; background:rgba(100,116,139,.25); color:var(--muted); }
  .badge.ok { background:rgba(34,197,94,.15); color:var(--ok); }
  .kv { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed rgba(148,163,184,.12); }
  .kv:last-child { border:0; } .kv .k { color:var(--muted); } .kv .v { font-variant-numeric:tabular-nums; }
  .section-title { color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:.05em; margin:28px 4px 12px; }
  input { width:100%; margin:6px 0; padding:9px 11px; background:#0b1324; border:1px solid var(--line); border-radius:8px; color:var(--fg); font-size:14px; }
  button { padding:9px 14px; border:0; border-radius:8px; background:#2563eb; color:#fff; font-size:14px; cursor:pointer; margin:4px 6px 4px 0; }
  button.ghost { background:#334155; } button:disabled { opacity:.5; cursor:default; }
  .msg { font-size:13px; margin-top:8px; min-height:18px; } .msg.ok { color:var(--ok); } .msg.err { color:var(--err); } .msg.busy { color:var(--accent); }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:18px; }
  a { color:var(--accent); }
</style>
</head>
<body>
  <header>
    <span class="dot" id="live"></span>
    <h1>digitalhome.edge</h1>
    <span class="badge" id="ts">connecting…</span>
    <span class="src" id="src"></span>
  </header>
  <main>
    <div class="grid" id="tiles"><div class="card"><h2>Loading…</h2></div></div>

    <div class="section-title">Onboarding</div>
    <div class="grid">
      <!-- Solar -->
      <div class="card"><h2>Solar (Solarman) <span class="badge" id="b-solar">—</span></h2>
        <input id="solar-email" placeholder="Solarman email" autocomplete="username" />
        <input id="solar-pass" type="password" placeholder="Solarman password" autocomplete="current-password" />
        <button onclick="connect('solar')">Connect</button>
        <div class="msg" id="m-solar"></div>
      </div>
      <!-- CCU -->
      <div class="card"><h2>Homematic CCU <span class="badge" id="b-ccu">—</span></h2>
        <button class="ghost" onclick="scan('ccu')">Scan network</button>
        <input id="ccu-ip" placeholder="CCU IP (e.g. 192.168.1.2)" />
        <input id="ccu-token" placeholder="API token (recommended)" />
        <button onclick="connect('ccu')">Connect</button>
        <div class="msg" id="m-ccu"></div>
      </div>
      <!-- Hue -->
      <div class="card"><h2>Philips Hue <span class="badge" id="b-hue">—</span></h2>
        <button class="ghost" onclick="scan('hue')">Scan network</button>
        <input id="hue-ip" placeholder="Hue bridge IP" />
        <button onclick="connect('hue')">Connect (press bridge button)</button>
        <div class="msg" id="m-hue"></div>
      </div>
    </div>
  </main>
  <footer>Native React/JS shell · live over WebSocket · onboarding via /app-api/* — no iframe</footer>

<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (n) => (n === null || n === undefined) ? '—' : n;
  const setMsg = (src, text, cls) => { const el=$('m-'+src); el.textContent=text; el.className='msg '+(cls||''); };

  // ── live status (WebSocket + polling fallback) ──
  function tile(title, link, rows) {
    const linked = link && link.state === 'linked';
    return `<div class="card"><h2>${title}<span class="badge ${linked?'ok':''}">${linked?'connected':(link&&link.state)||'—'}</span></h2>
      ${rows.map(r=>`<div class="kv"><span class="k">${r[0]}</span><span class="v">${fmt(r[1])}</span></div>`).join('')}</div>`;
  }
  function render(s, source) {
    $('live').classList.add('live');
    $('ts').textContent='updated '+new Date(s.ts).toLocaleTimeString(); $('src').textContent=source;
    const solar=s.solar||{}, ccu=s.ccu||{}, hue=s.hue||{}, pl=s.pipeline||{}, sd=(solar.latest&&solar.latest.data)||{};
    for(const [k,link] of [['solar',solar.link],['ccu',ccu.link],['hue',hue.link]]){
      const b=$('b-'+k); const on=link&&link.state==='linked'; b.textContent=on?'connected':(link&&link.state)||'—'; b.className='badge'+(on?' ok':'');
    }
    $('tiles').innerHTML =
      tile('Solar', solar.link, [['Account',solar.link&&solar.link.email],['PV power',sd.generationPower!=null?sd.generationPower+' W':'—'],['Load',sd.usePower!=null?sd.usePower+' W':'—'],['Battery',sd.batterySoc!=null?sd.batterySoc+' %':'—']]) +
      tile('CCU', ccu.link, [['IP',ccu.link&&ccu.link.ip],['Devices',ccu.latest&&ccu.latest.devices],['Datapoints',ccu.latest&&ccu.latest.datapoints]]) +
      tile('Hue', hue.link, [['IP',hue.link&&hue.link.ip],['Sensors',hue.latest&&hue.latest.sensors],['Lights',hue.latest&&hue.latest.lights]]) +
      tile('Pipeline', {state:pl.recent_mapped?'linked':'idle'}, [['Sources',(pl.sources||[]).join(', ')||'—'],['Mappings',pl.counts?pl.counts.sourceMap+' fields':'—'],['Recent obs',pl.recent_mapped]]);
  }
  let pollTimer=null;
  const startPoll=()=>{ if(pollTimer)return; const p=async()=>{ try{ render(await(await fetch('/app-api/status',{cache:'no-store'})).json(),'polling'); }catch(e){ $('live').classList.remove('live'); } }; p(); pollTimer=setInterval(p,3000); };
  const stopPoll=()=>{ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } };
  function connectWS(){ try{ const proto=location.protocol==='https:'?'wss':'ws'; const ws=new WebSocket(proto+'://'+location.host+'/app-api/ws');
    ws.onmessage=(e)=>{ stopPoll(); try{ render(JSON.parse(e.data),'live · websocket'); }catch(_){} };
    ws.onclose=()=>{ startPoll(); setTimeout(connectWS,5000); }; ws.onerror=()=>ws.close(); }catch(e){ startPoll(); } }
  connectWS(); startPoll();

  // ── onboarding ──
  async function scan(source){
    setMsg(source,'scanning the network…','busy');
    try{
      const r=await fetch('/app-api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source})});
      const j=await r.json();
      if(j.candidates && j.candidates.length){ $(source+'-ip').value=j.candidates[0].ip; setMsg(source,'found: '+j.candidates.map(c=>c.ip).join(', '),'ok'); }
      else setMsg(source,'no '+source.toUpperCase()+' found on '+(j.subnet||'?')+'.0/24','err');
    }catch(e){ setMsg(source,'scan failed','err'); }
  }
  async function connect(source){
    const body={source};
    if(source==='ccu'){ body.ip=$('ccu-ip').value.trim(); body.token=$('ccu-token').value.trim(); }
    else if(source==='hue'){ body.ip=$('hue-ip').value.trim(); setMsg('hue','pairing… press the round button on the bridge now (up to 30s)','busy'); }
    else if(source==='solar'){ body.email=$('solar-email').value.trim(); body.password=$('solar-pass').value; setMsg('solar','connecting to Solarman…','busy'); }
    if(source!=='hue') setMsg(source,'connecting…','busy');
    try{
      const r=await fetch('/app-api/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await r.json();
      setMsg(source, (j.ok?'✓ ':'✗ ')+(j.message||(j.ok?'connected':'failed')), j.ok?'ok':'err');
      if(source==='solar') $('solar-pass').value='';
    }catch(e){ setMsg(source,'request failed','err'); }
  }
  window.scan=scan; window.connect=connect;
</script>
</body>
</html>
